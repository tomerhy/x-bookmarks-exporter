<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Video Gallery</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 18px;
      background: radial-gradient(1200px circle at 10% 10%, #121b2a, #0b0f14);
      color: #e6e9ef;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 20px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #version {
      font-size: 12px;
      color: #7c9cff;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(124, 156, 255, 0.4);
      background: rgba(124, 156, 255, 0.08);
    }
    #header-donate {
      background: linear-gradient(180deg, #f2d27a, #caa13a);
      color: #1a1406;
      border-color: rgba(255, 221, 140, 0.8);
      box-shadow: 0 8px 20px rgba(202, 161, 58, 0.35);
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 221, 140, 0.8);
      font-size: 13px;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease;
    }
    #header-donate:hover {
      border-color: rgba(255, 236, 180, 0.95);
      transform: translateY(-1px);
    }
    #layout {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }
    #player-wrap {
      position: sticky;
      top: 0;
      background: rgba(10, 14, 20, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 12px;
      z-index: 10;
      flex: 0 0 42%;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }
    #player {
      width: 100%;
      max-height: 520px;
      background: #000;
      border-radius: 12px;
      outline: 1px solid rgba(255, 255, 255, 0.06);
    }
    #grid { flex: 1; }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .card {
      background: #111826;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      transition: transform 120ms ease, border-color 120ms ease;
      content-visibility: auto;
      contain-intrinsic-size: 180px 180px;
      position: relative;
    }
    .card-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 3;
    }
    .card-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(12, 16, 24, 0.7);
      color: #e6e9ef;
      cursor: pointer;
      box-shadow: none;
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }
    .card-btn:hover {
      border-color: rgba(124, 156, 255, 0.6);
    }
    .quality-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 2px 8px;
      font-size: 11px;
      color: #0b0f14;
      background: linear-gradient(135deg, #f2d27a, #caa13a);
      border-radius: 999px;
      border: 1px solid rgba(255, 221, 140, 0.8);
      z-index: 3;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(124, 156, 255, 0.55);
    }
    .thumb {
      width: 100%;
      height: 120px;
      background: #000;
      object-fit: cover;
      border-radius: 10px;
    }
    .meta {
      display: none;
    }
    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      font-size: 11px;
      color: #0b0f14;
      background: linear-gradient(135deg, #7c9cff, #b4c5ff);
      border-radius: 999px;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: #a3b1c6;
    }
    button {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #1a2332, #131a26);
      color: #e6e9ef;
      font-size: 12px;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      transition: transform 120ms ease, border-color 120ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 156, 255, 0.6);
    }
    #file-input { display: none; }
    #count { margin-top: 10px; font-size: 12px; color: #a3b1c6; }
    #status { margin-top: 6px; font-size: 12px; color: #7c9cff; }
    #progress {
      margin-top: 6px;
      height: 6px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c9cff, #c2d2ff);
      transition: width 120ms ease;
    }
    #lang-selector {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #1a2332, #131a26);
      color: #e6e9ef;
      font-size: 11px;
      cursor: pointer;
      width: 100%;
    }
    #lang-selector:hover {
      border-color: rgba(124, 156, 255, 0.6);
    }

    /* ═══════════════════════════════════════════════════
       VIEW TOGGLE BUTTON (shared)
    ═══════════════════════════════════════════════════ */
    #view-toggle {
      display: flex;
      gap: 3px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 3px;
    }
    .view-btn {
      padding: 5px 13px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #a3b1c6;
      cursor: pointer;
      box-shadow: none;
      letter-spacing: 0.3px;
      transition: color 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    .view-btn:hover { color: #e6e9ef; transform: none; border-color: transparent; }
    .view-btn.active-view {
      background: rgba(124, 156, 255, 0.15);
      border-color: rgba(124, 156, 255, 0.3);
      color: #7c9cff;
    }

    /* ═══════════════════════════════════════════════════
       PRECOG MODE — MINORITY REPORT LAYOUT
    ═══════════════════════════════════════════════════ */

    /* Full-viewport immersive layout */
    body.precog-mode {
      background: #020810;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Animated grid background */
    body.precog-mode::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
      z-index: 0;
      animation: precog-grid 25s linear infinite;
    }
    @keyframes precog-grid { to { background-position: 52px 52px; } }
    body.precog-mode > * { position: relative; z-index: 1; }

    /* Header — compact, flush */
    body.precog-mode h2 {
      flex: 0 0 auto;
      padding: 10px 20px;
      margin: 0;
      border-bottom: 1px solid rgba(0,212,255,0.12);
    }
    body.precog-mode .view-btn.active-view {
      background: rgba(0,212,255,0.1);
      border-color: rgba(0,212,255,0.35);
      color: #00d4ff;
    }

    /* Classic layout hidden in precog — bubbles take over */
    body.precog-mode #layout { display: none !important; }

    /* Bubble field fills all space below header */
    #bubble-field {
      display: none;
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    body.precog-mode #bubble-field { display: block; }

    /* Player panel: fills all space except filmstrip */
    body.precog-mode #player-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: none;
      margin: 0;
      background: rgba(0,8,18,0.92);
      border: 1px solid rgba(0,212,255,0.22);
      box-shadow: 0 0 60px rgba(0,212,255,0.07), 0 30px 80px rgba(0,0,0,0.7);
      backdrop-filter: blur(14px);
      overflow: visible;
      display: flex;
      flex-direction: column;
      padding: 10px 12px 8px;
      box-sizing: border-box;
      position: relative;
    }

    /* Corner brackets */
    body.precog-mode #player-wrap::before {
      content: '';
      position: absolute;
      inset: -7px;
      background:
        linear-gradient(#00d4ff,#00d4ff) top    left  / 22px 2px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) top    left  / 2px 22px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) top    right / 22px 2px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) top    right / 2px 22px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) bottom left  / 22px 2px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) bottom left  / 2px 22px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) bottom right / 22px 2px no-repeat,
        linear-gradient(#00d4ff,#00d4ff) bottom right / 2px 22px no-repeat;
      pointer-events: none;
      opacity: 0.65;
    }

    /* HUD bar */
    body.precog-mode #precog-hud {
      display: flex !important;
      flex: 0 0 auto;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1.8px;
      color: rgba(0,212,255,0.55);
      text-transform: uppercase;
    }
    .hud-blink {
      display: inline-block;
      color: #00d4ff;
      animation: hud-blink 1.8s ease-in-out infinite;
      margin-right: 4px;
    }
    @keyframes hud-blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* Video fills all remaining space in panel */
    body.precog-mode #player {
      flex: 1;
      min-height: 0;
      width: 100%;
      max-height: none;
      border-radius: 8px;
      background: #000;
      outline: 1px solid rgba(0,212,255,0.1);
      transition: filter 0.06s ease, opacity 0.18s ease;
    }

    .scan-sweep-line { display: none; }

    /* Scanline texture */
    .scanline-overlay {
      display: none;
      position: absolute;
      left: 12px; right: 12px;
      top: 32px;
      bottom: 105px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.035) 3px,
        rgba(0,0,0,0.035) 4px
      );
      pointer-events: none;
      z-index: 3;
      border-radius: 8px;
    }
    body.precog-mode .scanline-overlay { display: block !important; }

    /* Controls strip — compact */
    body.precog-mode .actions {
      flex: 0 0 auto;
      margin-top: 6px;
      gap: 6px;
    }
    body.precog-mode .toggle {
      flex: 0 0 auto;
      color: rgba(0,212,255,0.5);
      margin-top: 3px;
    }
    body.precog-mode #count,
    body.precog-mode #status {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.6px;
      color: rgba(0,212,255,0.45);
      margin-top: 2px;
    }
    body.precog-mode #progress  { background: rgba(0,212,255,0.07); margin-top: 3px; }
    body.precog-mode #progress-bar {
      background: linear-gradient(90deg, #00d4ff, #0055ff);
      box-shadow: 0 0 8px rgba(0,212,255,0.5);
    }
    body.precog-mode #lang-selector {
      background: rgba(0,12,26,0.85);
      border-color: rgba(0,212,255,0.18);
      color: rgba(0,212,255,0.55);
      margin-top: 3px;
    }
    body.precog-mode button:not(.view-btn):not(#header-donate) {
      background: rgba(0,12,26,0.85);
      border-color: rgba(0,212,255,0.18);
      color: #7dcfea;
    }
    body.precog-mode button:not(.view-btn):not(#header-donate):hover {
      border-color: rgba(0,212,255,0.55);
      box-shadow: 0 0 14px rgba(0,212,255,0.15);
      color: #00d4ff;
      transform: translateY(-1px);
    }
    body.precog-mode .badge {
      background: linear-gradient(135deg,#004466,#006688);
      color: #00d4ff;
    }

    /* ── Bubble canvas ── */
    #bubble-field canvas { display: block; }

    /* ── Bubble modal ── */
    #bubble-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 900;
      align-items: center;
      justify-content: center;
    }
    #bubble-modal.open { display: flex; }

    #bubble-modal-bg {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #bubble-modal-box {
      position: relative;
      z-index: 1;
      width: min(820px, 92vw);
      max-height: 90vh;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.22),
        0 0 80px rgba(0,212,255,0.18),
        0 40px 120px rgba(0,0,0,0.95);
      animation: modal-enter 0.38s cubic-bezier(0.34,1.4,0.64,1) both;
    }

    @keyframes modal-enter {
      from { transform: scale(0.55); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #bubble-modal-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    #bubble-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s ease, transform 0.12s ease;
    }
    #bubble-modal-close:hover {
      background: rgba(200,40,40,0.85);
      transform: scale(1.1);
    }

    .bubble-pop-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 212, 255, 0.85);
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5), inset 0 0 6px rgba(0, 212, 255, 0.2);
      transform: translate(-50%, -50%) scale(1);
      pointer-events: none;
      animation: ring-expand 0.45s ease-out forwards;
    }

    @keyframes ring-expand {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(3);   opacity: 0; }
    }

    .bubble-pop-drop {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(0, 212, 255, 0.9);
      box-shadow: 0 0 4px rgba(0, 212, 255, 0.8);
      pointer-events: none;
      animation: drop-scatter 0.5s ease-out forwards;
    }

    @keyframes drop-scatter {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.9; }
      100% { transform: translate(var(--dx, 0), var(--dy, 0)) scale(0); opacity: 0; }
    }

    /* ── Glitch effect on video switch ── */
    @keyframes precog-glitch {
      0%   { filter: hue-rotate(90deg)  brightness(2.2) saturate(4); transform: translateX(-5px) skewX( 4deg); }
      25%  { filter: hue-rotate(-70deg) brightness(1.8) saturate(2); transform: translateX( 5px) skewX(-3deg); }
      50%  { filter: brightness(3.5) saturate(0) invert(0.1);        transform: translateX(-3px); }
      75%  { filter: hue-rotate(180deg) brightness(1.3);             transform: translateX( 2px) skewX( 1deg); }
      100% { filter: none;                                            transform: none; }
    }
    body.precog-mode #player.glitching {
      animation: precog-glitch 0.26s steps(4) forwards;
    }

    /* ── Mode switch scan-in ── */
    body.precog-entering #layout {
      animation: precog-scan-in 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes precog-scan-in {
      0%   { opacity:0; clip-path: inset(0 0 100% 0); }
      100% { opacity:1; clip-path: inset(0 0 0%   0); }
    }
  </style>
</head>
<body>
  <h2>
    <div class="header-left">
      <span data-i18n="videoGallery">Video Gallery</span>
      <span id="version"></span>
    </div>
    <div id="view-toggle">
      <button class="view-btn active-view" id="btn-classic">⊞ Classic</button>
      <button class="view-btn" id="btn-precog">◉ Bubble Mode</button>
    </div>
    <button id="header-donate" data-i18n="donate">Donate</button>
  </h2>
  <div id="layout">
    <div id="player-wrap">
      <!-- HUD bar — only visible in precog mode -->
      <div id="precog-hud" style="display:none">
        <span><span class="hud-blink">●</span>BUBBLE MODE</span>
        <span>MEDIA OBJECTS: <span id="hud-count">0</span></span>
      </div>
      <video id="player" controls></video>
      <div class="scanline-overlay"></div>
      <div class="scan-sweep-line"></div>
    <div class="actions">
        <button id="export" data-i18n="exportUrls">Export URLs</button>
      <button id="import" data-i18n="importUrls">Import URLs</button>
        <button id="copy" data-i18n="copyUrls">Copy URLs</button>
        <button id="clear" data-i18n="clear">Clear</button>
      </div>
    <label class="toggle">
      <input id="mp4-only" type="checkbox" checked />
      <span data-i18n="mp4Only">MP4 only</span>
    </label>
      <select id="lang-selector">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
      </select>
      <div id="count"></div>
    <div id="status"></div>
    <div id="progress"><div id="progress-bar"></div></div>
      <input id="file-input" type="file" accept=".txt" />
    </div>
    <div id="grid"></div>
  </div>
  <div id="bubble-modal">
    <div id="bubble-modal-bg"></div>
    <div id="bubble-modal-box">
      <button id="bubble-modal-close">✕</button>
      <video id="bubble-modal-video" controls playsinline></video>
    </div>
  </div>
  <div id="bubble-field"></div>
  <script src="i18n.js"></script>
  <script src="analytics.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
